<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html">
<h:head>
    <title>Quizly - Join Session</title>
    <h:outputStylesheet name="css/base.css" />

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* En-tête de marque flottant */
        .student-header {
            position: absolute;
            top: 32px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.04em;
        }

        /* Cartes de connexion et d'attente */
        .login-card,
        .waiting-card {
            width: 100%;
            max-width: 440px;
            text-align: center;
            margin-top: 60px;
        }

        .login-card h2 {
            font-size: 32px;
            margin-bottom: 24px;
        }

        .waiting-card h2 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        /* Champs de texte spécifiquement grossis pour le code PIN */
        .join-inputs input[type="text"] {
            margin-bottom: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            padding: 16px;
            letter-spacing: 0.05em;
        }

        .join-inputs .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            margin-top: 8px;
        }

        /* FIX: Bloquer les effets de survol sur TOUS les boutons désactivés */
        .btn:disabled,
        .btn:disabled:hover {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            background-color: var(--primary-color) !important;
            /* Garde la couleur de base mais atténuée par l'opacity */
        }

        /* Message d'erreur stylisé premium */
        .error-msg {
            color: var(--danger-color);
            font-weight: 700;
            margin-bottom: 20px;
            display: none;
            background: var(--danger-bg);
            padding: 12px;
            border-radius: var(--border-radius-sm);
            border: 2px solid #fca5a5;
            font-size: 15px;
        }

        /* Spinner d'attente moderne */
        .spinner {
            margin: 40px auto;
            width: 56px;
            height: 56px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* =========================================
           Question Interface
           ========================================= */
        #questionArea {
            display: none;
            width: 100%;
            max-width: 800px;
            margin-top: 60px;
        }

        .question-text {
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 48px;
            letter-spacing: -0.03em;
            line-height: 1.3;
        }

        /* Grille des réponses */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 48px;
        }

        @media (max-width: 600px) {
            .choices-grid {
                grid-template-columns: 1fr;
            }
        }

        .choice-btn {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            text-align: left;
            width: 100%;
        }

        .choice-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: #d4d4d8;
        }

        /* Etat "Sélectionné" d'une réponse */
        .choice-btn.selected {
            background-color: var(--primary-light);
            border-color: var(--primary-color);
            box-shadow: 0 4px 6px -1px var(--primary-shadow);
            transform: translateY(-2px);
        }

        .choice-letter {
            background: var(--bg-color);
            color: var(--text-muted);
            width: 44px;
            height: 44px;
            border-radius: var(--border-radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-weight: 900;
            font-size: 18px;
            border: 2px solid var(--border-color);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .choice-btn.selected .choice-letter {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Boîte de pari (Risk Assessment) */
        .risk-box {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 32px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: var(--shadow-sm);
        }

        .risk-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary-color);
            font-weight: 900;
            margin: 0 0 8px 0;
        }

        .risk-subtitle {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
            margin: 0 0 24px 0;
            letter-spacing: -0.02em;
        }

        /* Segmented Control pour les paris */
        .wager-grid {
            display: flex;
            justify-content: center;
            background: var(--bg-color);
            border-radius: var(--border-radius-sm);
            border: 2px solid var(--border-color);
            padding: 6px;
            gap: 6px;
        }

        .wager-btn {
            flex: 1;
            padding: 16px 8px;
            background: transparent;
            border: none;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 6px;
            font-size: 16px;
        }

        .wager-btn:hover {
            color: var(--text-main);
            background: #e4e4e7;
        }

        .wager-btn.selected {
            background: var(--text-main);
            color: white;
            transform: scale(1.02);
            box-shadow: var(--shadow-sm);
        }

        .submit-container {
            text-align: center;
        }

        .submit-container .btn {
            padding: 18px 40px;
            font-size: 18px;
            border-radius: 9999px;
        }
    </style>
</h:head>
<h:body>

    <div class="student-header">
        Quizly
    </div>

    <div class="card login-card" id="loginArea">
        <h2>Join Game</h2>
        <div id="errorBox" class="error-msg">Invalid PIN or Room Closed.</div>

        <div class="join-inputs">
            <input type="text" id="pinInput" placeholder="GAME PIN" autocomplete="off" />
            <input type="text" id="nameInput" placeholder="Your Nickname" autocomplete="off" />
            <button class="btn btn-primary" id="joinBtn">Enter Room</button>
        </div>
    </div>

    <div class="card waiting-card" id="waitingArea" style="display: none;">
        <h2>You're in!</h2>
        <h3 id="displayNameDisplay"
            style="color: var(--primary-color); font-size: 24px; font-weight: 900; margin-bottom: 16px;"></h3>
        <div class="spinner"></div>
        <p id="waitingMessage"
            style="color: var(--text-main); font-weight: 800; font-size: 18px; margin-top: 24px; white-space: pre-line;">
            See your nickname on screen?
        </p>
        <p id="waitingSub" style="font-size: 14px; color: #999;">Waiting for the host to start the game...</p>
        <div id="studentLeaderboard" style="display: none; margin-top: 20px; text-align: left;"></div>
    </div>

    <div id="questionArea">
        <div class="question-text" id="qText">Loading question...</div>

        <div class="choices-grid" id="choicesContainer">
        </div>

        <div class="risk-box">
            <p class="risk-title">Risk Assessment</p>
            <p class="risk-subtitle">How confident are you?</p>

            <div class="wager-grid">
                <button class="wager-btn" data-val="10">10 PTS</button>
                <button class="wager-btn" data-val="25">25 PTS</button>
                <button class="wager-btn" data-val="50">50 PTS</button>
                <button class="wager-btn" data-val="100">MAX</button>
            </div>
        </div>

        <div class="submit-container">
            <button class="btn btn-primary" id="submitAnswerBtn" disabled="disabled">Submit Answer ▻</button>
        </div>
    </div>

    <script>
        //<![CDATA[
        let websocket;
        let globalStudentName = "";

        // Game State Variables
        let selectedChoiceId = null;
        let selectedWager = null;

        // UI Elements
        const loginArea = document.getElementById("loginArea");
        const waitingArea = document.getElementById("waitingArea");
        const questionArea = document.getElementById("questionArea");
        const submitAnswerBtn = document.getElementById("submitAnswerBtn");
        const choicesContainer = document.getElementById("choicesContainer");

        // --- LOGIN LOGIC ---
        document.getElementById("joinBtn").addEventListener("click", () => {
            const pin = document.getElementById("pinInput").value.trim();
            const studentName = document.getElementById("nameInput").value.trim();

            if (!pin || !studentName) {
                showError("Please enter both a PIN and a Nickname.");
                return;
            }

            globalStudentName = studentName;
            document.getElementById("errorBox").style.display = "none";
            document.getElementById("joinBtn").innerText = "Connecting...";
            document.getElementById("joinBtn").disabled = true;

            connectToRoom(pin, studentName);
        });

        function connectToRoom(pin, studentName) {
            // 1. Détection automatique du protocole (sécurisé ou non)
            const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";

            // 2. Utilisation de #{request.contextPath} pour une URL dynamique et robuste
            const wsUri = wsProtocol + "//" + window.location.host + "#{request.contextPath}/quiz/" + pin;

            websocket = new WebSocket(wsUri);

            websocket.onopen = function () {
                let joinCmd = {
                    action: "JOIN",
                    role: "STUDENT",
                    name: studentName
                };
                websocket.send(JSON.stringify(joinCmd));

                loginArea.style.display = "none";
                waitingArea.style.display = "block";
                document.getElementById("displayNameDisplay").innerText = studentName;
            };

            websocket.onmessage = function (evt) {
                try {
                    let message = JSON.parse(evt.data);

                    if (message.action === "NEW_QUESTION") {
                        displayQuestion(message.data);
                    }
                    if (message.action === "GAME_OVER") {
                        questionArea.style.display = "none";
                        waitingArea.style.display = "block";

                        document.getElementById("waitingMessage").innerHTML = "🏆 Game Over!";

                        const board = document.getElementById("studentLeaderboard");
                        board.style.display = "block";

                        board.innerHTML =
                            '<div style="background:white; border:1px solid #eaeaea; border-radius:12px; padding:30px; text-align:center;">' +
                            '<div style="font-size:48px; margin-bottom:10px;">' + (message.rank === 1 ? "🥇" : message.rank === 2 ? "🥈" : "🥉") + '</div>' +
                            '<div style="font-size:22px; color:#888; margin-bottom:5px;">Your Rank</div>' +
                            '<div style="font-size:64px; font-weight:900; color:#111;">#' + message.rank + '</div>' +
                            '<div style="font-size:22px; color:#0d6efd; font-weight:bold; margin-top:10px;">' + message.points + ' PTS</div>' +
                            '</div>' +
                            '<button class="btn-primary" style="background-color:#0d6efd; margin-top:20px;" onclick="window.location.reload()">Exit Game</button>';
                    }

                } catch (e) {
                    console.log("Failed to parse JSON: " + evt.data);
                }
            };

            websocket.onclose = function (evt) {
                loginArea.style.display = "block";
                waitingArea.style.display = "none";
                questionArea.style.display = "none";
                document.getElementById("joinBtn").innerText = "Enter Room";
                document.getElementById("joinBtn").disabled = false;

                // evt.reason contains the string you passed in CloseReason on the server
                if (evt.reason && evt.reason.length > 0) {
                    showError(evt.reason); // ← Shows your exact server message
                } else {
                    showError("Connection refused: Invalid PIN or closed session.");
                }
            };
        }

        function showError(msg) {
            const err = document.getElementById("errorBox");
            err.innerText = msg;
            err.style.display = "block";
        }

        // --- QUESTION UI LOGIC ---
        function displayQuestion(questionData) {
            waitingArea.style.display = "none";
            questionArea.style.display = "block";

            // Reset state
            selectedChoiceId = null;
            selectedWager = null;
            submitAnswerBtn.disabled = true;

            // Set Title
            document.getElementById("qText").innerText = questionData.text;

            // Clear old choices
            choicesContainer.innerHTML = "";
            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

            // Generate Choice Buttons
            questionData.choices.forEach((choice, index) => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";

                const letterDiv = document.createElement("div");
                letterDiv.className = "choice-letter";
                letterDiv.textContent = letters[index];

                const textSpan = document.createElement("span");
                textSpan.textContent = choice.text;

                btn.appendChild(letterDiv);
                btn.appendChild(textSpan);

                btn.onclick = () => {
                    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedChoiceId = choice.id;
                    checkFormReady();
                };

                choicesContainer.appendChild(btn);
            });

            // Reset Wager Buttons
            document.querySelectorAll('.wager-btn').forEach(btn => {
                btn.classList.remove('selected');
                btn.onclick = function () {
                    document.querySelectorAll('.wager-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedWager = this.getAttribute('data-val');
                    checkFormReady();
                };
            });
        }

        function checkFormReady() {
            if (selectedChoiceId !== null && selectedWager !== null) {
                submitAnswerBtn.disabled = false;
            }
        }

        // --- SUBMIT ANSWER LOGIC ---
        submitAnswerBtn.onclick = function () {
            const answerData = {
                choiceId: selectedChoiceId,
                wager: parseInt(selectedWager)
            };

            const msg = {
                action: "SUBMIT_ANSWER",
                role: "STUDENT",
                name: globalStudentName,
                payload: JSON.stringify(answerData)
            };

            websocket.send(JSON.stringify(msg));

            questionArea.style.display = "none";
            waitingArea.style.display = "block";
            // Le saut de ligne (\n) s'affichera correctement grâce au white-space: pre-line !
            document.getElementById("waitingMessage").innerText = "Answer locked! \n Waiting for time to expire...";
        };
        //]]>
    </script>
</h:body>

</html>
