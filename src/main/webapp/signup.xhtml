<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Quizly - Create Account</title>
    <h:outputStylesheet name="css/base.css" />
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            padding: 24px;
        }
        
        .login-card {
            background: var(--card-bg);
            padding: 48px 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border-color);
        }

        /* Branding et Titres */
        .brand-header {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.04em;
            margin-bottom: 40px;
        }

        .login-card h2 { 
            font-size: 24px; 
            font-weight: 800; 
            margin-bottom: 8px; 
            color: var(--text-main); 
            letter-spacing: -0.02em;
        }
        
        p.subtitle { 
            color: var(--text-muted); 
            font-size: 15px; 
            font-weight: 500;
            margin-bottom: 32px; 
        }
        
        /* Formulaires */
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--text-main); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 0.05em;
        }
        
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            /* Slightly smaller margin-bottom than login to fit 4 fields nicely */
            margin-bottom: 20px; 
            border: 2px solid var(--border-color);
            background-color: var(--bg-color);
            border-radius: var(--border-radius-sm);
            box-sizing: border-box;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-main);
            transition: var(--transition);
        }
        
        input[type="email"]:focus, input[type="password"]:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        
        /* Boutons */
        .btn-primary {
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary-color); 
            color: white;
            border: none; 
            border-radius: var(--border-radius-sm); 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            margin-bottom: 16px;
            margin-top: 8px; /* Extra space above submit button */
            box-shadow: 0 4px 6px -1px var(--primary-shadow);
            transition: var(--transition);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -2px var(--primary-shadow);
        }

        .btn-google {
            width: 100%; 
            padding: 14px; 
            background-color: white; 
            color: var(--text-main);
            border: 2px solid var(--border-color); 
            border-radius: var(--border-radius-sm); 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .btn-google:hover {
            background-color: var(--bg-color);
            border-color: #d4d4d8;
        }

        /* Footer */
        .footer { 
            text-align: center; 
            font-size: 14px; 
            font-weight: 500;
            margin-top: 32px; 
            color: var(--text-muted);
        }
        
        .footer a { 
            color: var(--primary-color); 
            font-weight: 700;
            text-decoration: none; 
            transition: var(--transition);
        }
        
        .footer a:hover { color: var(--primary-hover); }
        
        /* Alertes */
        #errorMessage { 
            color: var(--danger-color); 
            background: var(--danger-bg);
            border: 2px solid #fca5a5;
            padding: 12px;
            border-radius: var(--border-radius-sm);
            font-size: 14px; 
            font-weight: 700;
            text-align: center; 
            margin-bottom: 24px; 
            display: none; 
        }
    </style>
</h:head>
<h:body>

    <div class="login-card">
        <div class="brand-header">Quizly</div>
        
        <h2>Create an Account</h2>
        <p class="subtitle">Join Quizly to start creating and hosting quizzes.</p>

        <div id="errorMessage"></div>

        <label>Full Name</label>
        <input type="text" id="nameInput" placeholder="Dr. Sarah Jenkins" autocomplete="name" />

        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="name@school.edu" autocomplete="email" />

        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="new-password" />
        
        <label>Confirm Password</label>
        <input type="password" id="confirmPasswordInput" placeholder="••••••••" autocomplete="new-password" />

        <button id="signUpBtn" class="btn-primary">Create Account</button>
        
        <button id="googleBtn" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
        </button>

        <div class="footer">
            Already have an account? <a href="login.xhtml">Sign In</a>
        </div>
    </div>

    <h:form id="jsfAuthForm" style="display: none;">
        <h:inputHidden id="firebaseToken" value="#{signupBean.firebaseToken}" />
        <h:inputHidden id="profName" value="#{signupBean.teacherName}" />
        <h:commandButton id="submitTokenBtn" action="#{signupBean.completeSignup}" />
    </h:form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwWjdArUUA_Z2OrG2nfvcVNB8Mw32NVk0",
            authDomain: "quizly-356ee.firebaseapp.com",
            projectId: "quizly-356ee",
            storageBucket: "quizly-356ee.firebasestorage.app",
            messagingSenderId: "363406687914",
            appId: "1:363406687914:web:ea95a7b5ed93c187fa1ad3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const errorDiv = document.getElementById("errorMessage");

        function sendTokenToJava(token, name) {
            sessionStorage.setItem("quizlyToken", token); 
            document.getElementById("jsfAuthForm:firebaseToken").value = token;
            document.getElementById("jsfAuthForm:profName").value = name;
            document.getElementById("jsfAuthForm:submitTokenBtn").click();
        }

        // 1. Handle Native Sign Up
        document.getElementById("signUpBtn").addEventListener("click", () => {
            const name = document.getElementById("nameInput").value;
            const email = document.getElementById("emailInput").value;
            const password = document.getElementById("passwordInput").value;
            const confirmPassword = document.getElementById("confirmPasswordInput").value;

            if (password !== confirmPassword) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Passwords do not match!";
                return;
            }

            // Tell Firebase to create the new user
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Update their Firebase profile with their name
                    return updateProfile(userCredential.user, { displayName: name })
                        .then(() => userCredential.user.getIdToken());
                })
                .then((token) => {
                    sendTokenToJava(token, name);
                })
                .catch((error) => {
                    errorDiv.style.display = "block";
                    errorDiv.innerText = "Sign Up Failed: " + error.message;
                });
        });

        // 2. Handle Google Sign Up
        document.getElementById("googleBtn").addEventListener("click", () => {
            signInWithPopup(auth, googleProvider)
                .then((result) => {
                    const tokenPromise = result.user.getIdToken();
                    const name = result.user.displayName;
                    return Promise.all([tokenPromise, name]);
                })
                .then(([token, name]) => {
                    sendTokenToJava(token, name);
                })
                .catch((error) => {
                    errorDiv.style.display = "block";
                    errorDiv.innerText = "Google Sign Up Failed: " + error.message;
                });
        });
    </script>
</h:body>
</html>
